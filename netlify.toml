[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' https://api.fontshare.com 'unsafe-inline'; font-src 'self' https://cdn.fontshare.com; img-src 'self' data:;"
    Cross-Origin-Opener-Policy = "same-origin"